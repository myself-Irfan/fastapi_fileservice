{% extends "base.html" %}
{% block title %}Edit Collection{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">Edit Collection</h2>
    </div>

    <div class="card p-0 bg-dark text-white">
        <div class="card-header text-white" style="background-color: #6f42c1;">
            <h5 class="card-title mb-0">
                <i class="bi bi-pencil-square me-2"></i>Collection Details
            </h5>
        </div>
        <div class="card-body">
            <form id="edit-form" novalidate>
                <div class="mb-3">
                    <label for="title" class="form-label">Title <span class="text-danger">*</span></label>
                    <input type="text"
                           id="title"
                           name="title"
                           class="form-control"
                           required
                           maxlength="100"
                           placeholder="Enter collection title"
                           aria-describedby="title-help title-feedback">
                    <div id="title-help" class="form-text text-warning">Title must be between 3 and 100 characters</div>
                    <div id="title-feedback" class="invalid-feedback"></div>
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label">Description</label>
                    <textarea id="description"
                              name="description"
                              class="form-control"
                              rows="4"
                              maxlength="200"
                              placeholder="Enter collection description (optional)"
                              aria-describedby="description-help"></textarea>
                    <div id="description-help" class="form-text text-warning">Optional. Maximum 200 characters</div>
                </div>

                <div id="feedback-message" class="alert mt-3 d-none" role="alert">
                    <i id="feedback-icon" class="me-2"></i>
                    <span id="feedback-text"></span>
                </div>

                <div class="d-flex gap-2 justify-content-end">
                    <a href="/" class="btn btn-outline-secondary">
                        <i class="bi bi-x-circle me-2"></i>Cancel
                    </a>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-pencil-square me-2"></i>Update Collection
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block customjs %}
<script>
    const COLLECTION_ID = "{{ collection_id }}";
</script>
<script src="/static/js/edit.js"></script>
{% endblock %}
