{% extends "base.html" %}

{% block title %}My Files{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">

        <div id="alert-container" class="mb-3"></div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">My Files</h2>
            <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#uploadModal">
                <i class="bi bi-upload me-2"></i>Upload File
            </button>
        </div>

        <div class="row mb-4">
            <div class="col-md-6">
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-search"></i></span>
                    <input type="text" class="form-control" placeholder="Search files..." id="search-input">
                </div>
            </div>
        </div>

        <div class="card">
            <div class="table-responsive">
                <table class="table table-dark table-hover mb-0" id="files-table">
                    <thead class="table-dark" style="background-color: #6f42c1;">
                        <tr>
                            <th>Name</th>
                            <th>Type</th>
                            <th>Size</th>
                            <th class="d-none d-md-table-cell">Uploaded</th>
                            <th width="100">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="files-list"></tbody>
                </table>
            </div>
        </div>

        <div id="loading" class="text-center py-4 d-none">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>

        <div id="error-message" class="alert alert-danger mt-3 d-none" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span id="error-text"></span>
        </div>

        <div id="empty-state" class="text-center py-5 d-none">
            <i class="bi bi-file-earmark-x display-4 text-white mb-3"></i>
            <h4 class="text-white">No files yet</h4>
            <p class="text-white">Upload your first file to get started</p>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#uploadModal">
                <i class="bi bi-upload me-2"></i>Upload File
            </button>
        </div>

    </div>
</div>

<!-- Upload Modal -->
<div class="modal fade" id="uploadModal" tabindex="-1" aria-labelledby="uploadModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content bg-dark text-white">
            <div class="modal-header" style="background-color: #6f42c1;">
                <h5 class="modal-title" id="uploadModalLabel">
                    <i class="bi bi-upload me-2"></i>Upload File
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="upload-form">
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="file-input" class="form-label">File <span class="text-danger">*</span></label>
                        <input type="file" class="form-control" id="file-input"
                               accept=".pdf,.png,.jpg,.jpeg,.txt,.csv" required>
                        <div class="form-text text-muted">Allowed types: PDF, PNG, JPG, TXT, CSV</div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" id="upload-btn" class="btn btn-success">
                        <i class="bi bi-upload me-2"></i>Upload
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block customjs %}
    <script src="/static/js/files.js"></script>
{% endblock %}
